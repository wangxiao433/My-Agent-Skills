github_username: wangxiao433
workspace_path: C:\Projects\Workspace
period: weekly
date: 2026-06-07
timezone_offset: 8

repositories:
  - wangxiao433/My-Agent-Skills

extensions: [.log, .txt, .out, .err]
keywords:
  - error
  - warning
  - failed
  - timeout
  - nan
  - oom
  - cuda out of memory
  - residual
  - loss exploded
  - divergence
