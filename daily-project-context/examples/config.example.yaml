github_username: wangxiao433
workspace_path: C:\Projects\Workspace
period: weekly
date: 2026-06-07
timezone_offset: 8

repositories:
  - wangxiao433/My-Agent-Skills

extensions: [.log, .txt, .out, .err, .lis, .lst, .msg, .sta, .mon, .jou, .zpl, .mjcf, .xml]
log_tools: [ansys, zemax, mujoco]
keywords:
  - error
  - warning
  - failed
  - timeout
  - nan
  - oom
  - cuda out of memory
  - residual
  - loss exploded
  - divergence
  - converge

excluded_dirs: [.git, node_modules, .venv, build, dist, __pycache__]
max_files: 40
max_file_bytes: 1000000
max_lines_per_file: 50
max_github_items: 100
include_pr_details: true
include_ci: true
cache_dir: .cache/daily-project-context
cache_ttl_seconds: 3600
format: markdown
include_public_events: true
